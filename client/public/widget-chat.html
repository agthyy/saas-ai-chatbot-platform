<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Чат с ИИ</title>
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
    .typing-dot {
      animation: typingBounce 1.4s infinite ease-in-out both;
    }
    .typing-dot:nth-child(2) {
      animation-delay: .2s;
    }
    .typing-dot:nth-child(3) {
      animation-delay: .4s;
    }
    @keyframes typingBounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col justify-between overflow-hidden text-sm">

  <!-- Header -->
  <header id="chat-header" class="flex items-center justify-between px-4 py-3 text-white shadow-md transition-colors duration-300" style="background-color: #3b82f6;">
    <div class="flex items-center space-x-3">
      <div id="header-logo-container" class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center overflow-hidden border border-white/10">
        <span id="header-logo-emoji" class="text-lg">🤖</span>
      </div>
      <div>
        <h1 id="header-title" class="font-semibold tracking-wide text-sm truncate max-w-[200px]">ИИ-Ассистент</h1>
        <p class="text-xs text-white/80 flex items-center">
          <span class="w-1.5 h-1.5 bg-green-400 rounded-full mr-1.5 animate-pulse"></span> В сети
        </p>
      </div>
    </div>
    <div class="flex items-center space-x-2">
      <!-- Booking Shortcut -->
      <button id="book-shortcut-btn" title="Записаться" class="p-1.5 rounded-full hover:bg-white/10 transition-colors hidden">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
        </svg>
      </button>
      <!-- Close Button -->
      <button id="close-widget-btn" class="p-1.5 rounded-full hover:bg-white/10 transition-colors">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>
  </header>

  <!-- Messages List -->
  <main id="messages-container" class="flex-1 overflow-y-auto px-4 py-4 space-y-3 no-scrollbar bg-slate-50">
    <!-- Messages are injected here -->
  </main>

  <!-- Typing Indicator (Hidden by default) -->
  <div id="typing-indicator" class="px-4 py-2 bg-slate-50 border-t border-slate-100 items-center space-x-2 hidden">
    <div class="flex items-center space-x-1 bg-white border border-slate-100 rounded-2xl px-3 py-2 shadow-sm max-w-[80px]">
      <div class="w-1.5 h-1.5 bg-slate-400 rounded-full typing-dot"></div>
      <div class="w-1.5 h-1.5 bg-slate-400 rounded-full typing-dot"></div>
      <div class="w-1.5 h-1.5 bg-slate-400 rounded-full typing-dot"></div>
    </div>
  </div>

  <!-- Input Area -->
  <footer class="p-3 bg-white border-t border-slate-100 flex items-center space-x-2">
    <!-- Booking Button -->
    <button id="book-btn" class="p-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-600 transition-colors flex-shrink-0" title="Записаться онлайн">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
      </svg>
    </button>
    <!-- Message input -->
    <input id="message-input" type="text" placeholder="Введите сообщение..." class="flex-1 px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm bg-slate-50" />
    <!-- Send Button -->
    <button id="send-btn" class="p-2.5 rounded-xl text-white transition-colors flex-shrink-0" style="background-color: #3b82f6;">
      <svg class="w-5 h-5 transform rotate-90" fill="currentColor" viewBox="0 0 24 24">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
      </svg>
    </button>
  </footer>

  <!-- Booking Modal / Panel (Hidden by default) -->
  <div id="booking-modal" class="fixed inset-0 bg-black/50 z-50 flex items-end justify-center hidden opacity-0 transition-opacity duration-300">
    <div class="bg-white w-full rounded-t-2xl max-h-[85vh] overflow-y-auto p-5 space-y-4 shadow-2xl transform translate-y-full transition-transform duration-300">
      
      <!-- Modal Header -->
      <div class="flex items-center justify-between border-b border-slate-100 pb-3">
        <h2 class="text-base font-bold text-slate-800">Онлайн-запись</h2>
        <button id="close-booking-btn" class="p-1 rounded-full hover:bg-slate-100">
          <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <!-- Booking Form -->
      <form id="booking-form" class="space-y-3.5">
        <!-- Service -->
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">Выберите услугу</label>
          <select id="booking-service" class="w-full px-3 py-2 border border-slate-200 rounded-xl bg-slate-50 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            <option value="" disabled selected>Загрузка услуг...</option>
          </select>
        </div>

        <!-- Date & Time Slot selection -->
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">Свободное время</label>
          <select id="booking-slot" class="w-full px-3 py-2 border border-slate-200 rounded-xl bg-slate-50 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            <option value="" disabled selected>Загрузка слотов...</option>
          </select>
        </div>

        <!-- Name -->
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">Ваше имя</label>
          <input type="text" id="booking-name" placeholder="Иван Иванов" class="w-full px-3 py-2 border border-slate-200 rounded-xl bg-slate-50 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required />
        </div>

        <!-- Phone -->
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">Номер телефона</label>
          <input type="tel" id="booking-phone" placeholder="+7 (999) 123-45-67" class="w-full px-3 py-2 border border-slate-200 rounded-xl bg-slate-50 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required />
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submit-booking-btn" class="w-full py-2.5 rounded-xl text-white font-semibold transition-colors mt-2" style="background-color: #3b82f6;">
          Подтвердить запись
        </button>
      </form>
    </div>
  </div>

  <!-- JavaScript logic -->
  <script>
    // Extract query parameters
    const params = new URLSearchParams(window.location.search);
    const businessId = params.get('businessId');
    const serverUrl = params.get('serverUrl') || window.location.origin;

    if (!businessId) {
      document.body.innerHTML = '<div class="p-6 text-center text-red-500">Ошибка: ID бизнеса не передан.</div>';
    }

    // Get visitorSessionId from localStorage or create one
    let sessionKey = `chat_session_${businessId}`;
    let visitorSessionId = localStorage.getItem(sessionKey);
    if (!visitorSessionId) {
      visitorSessionId = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 15);
      localStorage.setItem(sessionKey, visitorSessionId);
    }

    // UI elements
    const chatHeader = document.getElementById('chat-header');
    const headerTitle = document.getElementById('header-title');
    const headerLogoContainer = document.getElementById('header-logo-container');
    const headerLogoEmoji = document.getElementById('header-logo-emoji');
    const bookShortcutBtn = document.getElementById('book-shortcut-btn');
    const closeWidgetBtn = document.getElementById('close-widget-btn');
    const messagesContainer = document.getElementById('messages-container');
    const typingIndicator = document.getElementById('typing-indicator');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const bookBtn = document.getElementById('book-btn');
    const submitBookingBtn = document.getElementById('submit-booking-btn');

    // Modal elements
    const bookingModal = document.getElementById('booking-modal');
    const bookingModalContent = bookingModal.querySelector('.transform');
    const closeBookingBtn = document.getElementById('close-booking-btn');
    const bookingForm = document.getElementById('booking-form');
    const bookingService = document.getElementById('booking-service');
    const bookingSlot = document.getElementById('booking-slot');
    const bookingName = document.getElementById('booking-name');
    const bookingPhone = document.getElementById('booking-phone');

    // Local state variables
    let themeColor = '#3b82f6';
    let availableSlots = [];
    let services = [];
    let chatHistory = [];

    // Load message history from localStorage for instant display (persistence)
    const localHistoryKey = `chat_history_${businessId}_${visitorSessionId}`;
    const cachedHistory = localStorage.getItem(localHistoryKey);
    if (cachedHistory) {
      chatHistory = JSON.parse(cachedHistory);
      chatHistory.forEach(msg => appendMessage(msg.sender, msg.text, false));
    }

    // Load configuration from server
    fetch(`${serverUrl}/api/widget/config?businessId=${businessId}`)
      .then(res => res.json())
      .then(data => {
        if (!data.active) {
          document.body.innerHTML = `
            <div class="h-full flex flex-col items-center justify-center p-6 text-center bg-slate-50 text-slate-600">
              <span class="text-4xl mb-3">⚠️</span>
              <h2 class="font-bold text-base text-slate-800 mb-1">Чат отключен</h2>
              <p class="text-xs">Этот чат-бот временно приостановлен владельцем или администратором платформы.</p>
            </div>
          `;
          return;
        }

        // Apply theme color
        themeColor = data.color_theme || '#3b82f6';
        chatHeader.style.backgroundColor = themeColor;
        sendBtn.style.backgroundColor = themeColor;
        submitBookingBtn.style.backgroundColor = themeColor;

        // Apply logo & title
        headerTitle.innerText = data.name;
        if (data.logo_url) {
          headerLogoContainer.innerHTML = `<img src="${data.logo_url}" class="w-full h-full object-cover" alt="logo" />`;
        } else {
          // Set template specific icon
          const emojis = { cafe: '☕️', salon: '✨', clinic: '🏥' };
          headerLogoEmoji.innerText = emojis[data.template] || '🤖';
        }

        // Store slots and services
        availableSlots = data.slots || [];
        services = data.services || [];

        // Show/hide booking shortcut based on slots availability
        if (availableSlots.length > 0) {
          bookShortcutBtn.classList.remove('hidden');
        }

        // Setup booking dropdown options
        populateBookingOptions();

        // If no cached history, show welcome message
        if (chatHistory.length === 0) {
          const welcomeMsg = data.welcome_message || 'Привет! Чем могу помочь?';
          const msgObj = { sender: 'bot', text: welcomeMsg };
          chatHistory.push(msgObj);
          localStorage.setItem(localHistoryKey, JSON.stringify(chatHistory));
          appendMessage('bot', welcomeMsg);
        }
      })
      .catch(err => {
        console.error('Error loading config:', err);
        appendMessage('bot', 'Извините, не удалось подключиться к серверу.');
      });

    // Populate Booking Modal options
    function populateBookingOptions() {
      // Services
      bookingService.innerHTML = '<option value="" disabled selected>Выберите услугу...</option>';
      services.forEach(service => {
        const option = document.createElement('option');
        option.value = service;
        option.innerText = service;
        bookingService.appendChild(option);
      });

      // Slots
      bookingSlot.innerHTML = '<option value="" disabled selected>Выберите свободный слот...</option>';
      if (availableSlots.length === 0) {
        const option = document.createElement('option');
        option.value = '';
        option.disabled = true;
        option.innerText = 'Нет свободных слотов';
        bookingSlot.appendChild(option);
      } else {
        availableSlots.forEach(slot => {
          const option = document.createElement('option');
          option.value = slot.id;
          option.innerText = `${formatDate(slot.slot_date)} — ${slot.slot_time}`;
          bookingSlot.appendChild(option);
        });
      }
    }

    // Date formatter e.g., "31 мая"
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
    }

    // Append Message to UI
    function appendMessage(sender, text, animate = true) {
      const bubble = document.createElement('div');
      bubble.className = `flex ${sender === 'visitor' ? 'justify-end' : 'justify-start'} mb-1.5`;
      
      // Formatting text line breaks
      const formattedText = text.replace(/\n/g, '<br/>');

      bubble.innerHTML = `
        <div class="max-w-[80%] px-3.5 py-2.5 rounded-2xl shadow-sm leading-relaxed text-sm ${
          sender === 'visitor'
            ? 'bg-blue-600 text-white rounded-br-sm'
            : 'bg-white border border-slate-100 text-slate-800 rounded-bl-sm'
        } ${animate ? 'animate-fade-in' : ''}" style="${sender === 'visitor' ? `background-color: ${themeColor}` : ''}">
          <div>${formattedText}</div>
        </div>
      `;
      
      messagesContainer.appendChild(bubble);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Send Message
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      messageInput.value = '';
      appendMessage('visitor', text);

      // Save to local cache history
      chatHistory.push({ sender: 'visitor', text });
      localStorage.setItem(localHistoryKey, JSON.stringify(chatHistory));

      // Show typing indicator
      typingIndicator.classList.remove('hidden');
      typingIndicator.classList.add('flex');
      messagesContainer.scrollTop = messagesContainer.scrollHeight;

      try {
        const response = await fetch(`${serverUrl}/api/widget/chat`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            businessId,
            visitorSessionId,
            message: text
          })
        });

        const data = await response.json();
        
        // Hide typing indicator
        typingIndicator.classList.remove('flex');
        typingIndicator.classList.add('hidden');

        if (data.reply) {
          appendMessage('bot', data.reply);
          chatHistory.push({ sender: 'bot', text: data.reply });
          localStorage.setItem(localHistoryKey, JSON.stringify(chatHistory));
        } else if (data.error) {
          appendMessage('bot', `Ошибка: ${data.error}`);
        }
      } catch (err) {
        typingIndicator.classList.remove('flex');
        typingIndicator.classList.add('hidden');
        appendMessage('bot', 'Не удалось связаться с сервером. Попробуйте еще раз.');
        console.error('Chat error:', err);
      }
    }

    // Modal Control Functions
    function openModal() {
      bookingModal.classList.remove('hidden');
      // Force layout calculation
      bookingModal.offsetHeight;
      bookingModal.classList.remove('opacity-0');
      bookingModalContent.classList.remove('translate-y-full');
    }

    function closeModal() {
      bookingModal.classList.add('opacity-0');
      bookingModalContent.classList.add('translate-y-full');
      setTimeout(() => {
        bookingModal.classList.add('hidden');
      }, 300);
    }

    // Event listeners
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    bookBtn.addEventListener('click', openModal);
    bookShortcutBtn.addEventListener('click', openModal);
    closeBookingBtn.addEventListener('click', closeModal);
    
    // Close on click outside modal content
    bookingModal.addEventListener('click', (e) => {
      if (e.target === bookingModal) closeModal();
    });

    // Close widget signal to parent window
    closeWidgetBtn.addEventListener('click', () => {
      window.parent.postMessage({ type: 'close-widget' }, '*');
    });

    // Booking Submission
    bookingForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const slotId = bookingSlot.value;
      const serviceName = bookingService.value;
      const customerName = bookingName.value.trim();
      const customerPhone = bookingPhone.value.trim();

      if (!slotId || !serviceName || !customerName || !customerPhone) return;

      // Disable submit button
      submitBookingBtn.disabled = true;
      submitBookingBtn.innerText = 'Оформление записи...';

      try {
        const response = await fetch(`${serverUrl}/api/widget/book`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            businessId,
            slotId,
            customerName,
            customerPhone,
            serviceName,
            visitorSessionId
          })
        });

        const data = await response.json();

        if (response.ok) {
          // Success
          closeModal();
          
          // Clear form fields
          bookingName.value = '';
          bookingPhone.value = '';
          
          // Add a local bot message (also saved in DB by backend, but we put it in local chat state)
          const successText = `✅ Запись успешно оформлена!\nУслуга: ${serviceName}\nДата: ${data.booking.slot_date} в ${data.booking.slot_time}`;
          appendMessage('bot', successText);
          chatHistory.push({ sender: 'bot', text: successText });
          localStorage.setItem(localHistoryKey, JSON.stringify(chatHistory));

          // Reload slots to exclude the newly booked slot
          availableSlots = availableSlots.filter(s => s.id !== slotId);
          populateBookingOptions();
          if (availableSlots.length === 0) {
            bookShortcutBtn.classList.add('hidden');
          }
        } else {
          alert(data.error || 'Произошла ошибка при бронировании.');
        }
      } catch (err) {
        console.error('Booking submission error:', err);
        alert('Не удалось связаться с сервером. Попробуйте еще раз.');
      } finally {
        submitBookingBtn.disabled = false;
        submitBookingBtn.innerText = 'Подтвердить запись';
      }
    });

    // Listen for custom trigger from parent
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'widget-open') {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }
    });
  </script>
</body>
</html>
